<div class="form-container">
  <div class="form-header">
    <h2>Register Customer Profile</h2>
    <p class="section-desc">Create a new banking profile. KYC verification will run asynchronously.</p>
  </div>

  @if (errorMessage()) {
    <div class="error-banner" style="margin-bottom: 24px;">
      <span>⚠️ {{ errorMessage() }}</span>
    </div>
  }

  <div class="glass-card">
    <form (ngSubmit)="onSubmit()" #custForm="ngForm">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="firstName">First Name *</label>
          <input type="text" id="firstName" name="firstName" [(ngModel)]="customer.firstName" required class="form-control" placeholder="e.g. John">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="lastName">Last Name *</label>
          <input type="text" id="lastName" name="lastName" [(ngModel)]="customer.lastName" required class="form-control" placeholder="e.g. Smith">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="email">Email Address *</label>
          <input type="email" id="email" name="email" [(ngModel)]="customer.email" required class="form-control" placeholder="e.g. john.smith@domain.com">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="phone">Phone Number</label>
          <input type="text" id="phone" name="phone" [(ngModel)]="customer.phone" class="form-control" placeholder="e.g. +1-555-0101">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="dateOfBirth">Date of Birth</label>
          <input type="date" id="dateOfBirth" name="dateOfBirth" [(ngModel)]="customer.dateOfBirth" class="form-control">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="customerType">Customer Type</label>
          <select id="customerType" name="customerType" [(ngModel)]="customer.customerType" class="form-control">
            <option value="INDIVIDUAL">Individual</option>
            <option value="CORPORATE">Corporate</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="address">Street Address</label>
        <input type="text" id="address" name="address" [(ngModel)]="customer.address" class="form-control" placeholder="e.g. 123 Main Street">
      </div>

      <div class="form-row-triple">
        <div class="form-group">
          <label class="form-label" for="city">City</label>
          <input type="text" id="city" name="city" [(ngModel)]="customer.city" class="form-control" placeholder="New York">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="state">State</label>
          <input type="text" id="state" name="state" [(ngModel)]="customer.state" class="form-control" placeholder="NY">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="postalCode">Postal Code</label>
          <input type="text" id="postalCode" name="postalCode" [(ngModel)]="customer.postalCode" class="form-control" placeholder="10001">
        </div>
      </div>

      <div class="form-actions">
        <button type="button" routerLink="/customers" class="btn btn-secondary">Cancel</button>
        <button type="submit" [disabled]="!custForm.form.valid || loading()" class="btn btn-primary">
          @if (loading()) {
            <span>Saving...</span>
          } @else {
            <span>Register Customer</span>
          }
        </button>
      </div>
    </form>
  </div>
</div>
